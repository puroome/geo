<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한국지리 백지도 정복 - 게임</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f4f8;
      color: #1e293b;
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 헤더 ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 20px; font-weight: 800; color: #1e293b; }
    .logo span { color: #6366f1; }
    .user-badge {
      background: #ede9fe; border-radius: 20px;
      padding: 4px 12px; font-size: 12px; color: #6366f1; font-weight: 600;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .score-badge {
      background: #dcfce7; border-radius: 20px;
      padding: 4px 14px; font-size: 13px; color: #16a34a; font-weight: 700;
    }
    .btn-sm {
      background: #f1f5f9; border: 1px solid #e2e8f0; color: #64748b;
      border-radius: 8px; padding: 6px 14px; font-size: 12px;
      cursor: pointer; transition: background 0.2s; font-weight: 600;
    }
    .btn-sm:hover { background: #e2e8f0; color: #1e293b; }

    /* ── 메인 ── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      padding: 16px; gap: 12px;
      max-width: 1100px; width: 100%; margin: 0 auto;
    }

    /* ── 상단 컨트롤 바 ── */
    .control-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    /* 문제 유형 탭 */
    .mode-tabs { display: flex; gap: 6px; }

    .mode-tab {
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      white-space: nowrap;
    }
    .mode-tab .icon { font-size: 16px; }
    .mode-tab:hover { border-color: #a5b4fc; color: #4338ca; background: #f5f3ff; }
    .mode-tab.active {
      background: #6366f1; border-color: #6366f1; color: #fff;
    }

    /* 구분선 */
    .divider {
      width: 1px; height: 28px; background: #e2e8f0; flex-shrink: 0;
    }

    /* 지역 필터 */
    .filter-label { font-size: 12px; color: #94a3b8; font-weight: 600; white-space: nowrap; }

    .filter-btns { display: flex; gap: 5px; flex-wrap: wrap; }

    .filter-btn {
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 20px; padding: 5px 13px;
      font-size: 12px; color: #64748b; cursor: pointer;
      transition: all 0.2s; font-weight: 500;
    }
    .filter-btn:hover { background: #f5f3ff; border-color: #a5b4fc; }
    .filter-btn.active {
      background: #6366f1; border-color: #6366f1; color: #fff; font-weight: 700;
    }

    /* ── 게임 영역 ── */
    .game-area { display: flex; gap: 14px; flex: 1; }

    /* 백지도 패널 */
    .map-panel {
      flex: 1;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      min-height: 400px;
    }

    .map-top {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .map-hint {
      font-size: 12px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .map-controls { display: flex; gap: 6px; }

    .toggle-btn {
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 8px; padding: 5px 14px;
      font-size: 12px; color: #64748b; cursor: pointer;
      transition: all 0.2s; font-weight: 600;
    }
    .toggle-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }

    /* 선택된 지역 표시 */
    .selected-region-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #ede9fe; border-radius: 20px;
      padding: 4px 12px; font-size: 12px; color: #6366f1; font-weight: 700;
    }

    #map-svg {
      width: 100%; max-width: 480px; height: auto; display: block;
    }

    /* SVG 스타일 */
    #map-svg path {
      fill: #dbeafe; stroke: #93c5fd; stroke-width: 0.7;
      cursor: pointer; transition: fill 0.15s;
    }
    #map-svg path:hover { fill: #bfdbfe; }

    /* 선택된 지역 강조 */
    #map-svg path.selected-region { fill: #e0e7ff !important; stroke: #6366f1 !important; stroke-width: 1.5; }

    /* 퀴즈 패널 */
    .quiz-panel {
      width: 340px; display: flex; flex-direction: column; gap: 12px;
    }

    /* 진행바 */
    .progress-wrap { display: flex; align-items: center; gap: 8px; }
    .progress-bar {
      flex: 1; height: 6px; background: #e2e8f0; border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #6366f1; border-radius: 4px;
      transition: width 0.4s ease; width: 0%;
    }
    .progress-text { font-size: 12px; color: #94a3b8; white-space: nowrap; }

    /* 문제 카드 */
    .question-card {
      background: #fff; border: 1px solid #e2e8f0;
      border-radius: 16px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .q-type-badge {
      font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .badge-mcq { background: #ede9fe; color: #6366f1; }
    .badge-ox  { background: #fef3c7; color: #d97706; }
    .q-region { font-size: 11px; color: #94a3b8; font-weight: 600; }
    .q-count  { margin-left: auto; font-size: 11px; color: #cbd5e1; }
    .question-text { font-size: 15px; line-height: 1.75; color: #1e293b; font-weight: 500; }

    /* MCQ 보기 */
    .choices { display: flex; flex-direction: column; gap: 8px; }
    .choice-btn {
      background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 10px;
      padding: 11px 16px; font-size: 13px; color: #334155;
      cursor: pointer; text-align: left; transition: all 0.15s;
      display: flex; align-items: center; gap: 10px; font-weight: 500;
    }
    .choice-btn:hover:not(:disabled) { background: #f5f3ff; border-color: #a5b4fc; color: #4338ca; }
    .choice-btn .num {
      width: 24px; height: 24px; border-radius: 50%; background: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0; color: #64748b;
    }
    .choice-btn.correct { background: #f0fdf4; border-color: #16a34a; color: #15803d; }
    .choice-btn.correct .num { background: #bbf7d0; color: #15803d; }
    .choice-btn.wrong { background: #fff1f2; border-color: #dc2626; color: #b91c1c; }
    .choice-btn.wrong .num { background: #fecaca; color: #b91c1c; }
    .choice-btn:disabled { cursor: not-allowed; }

    /* OX 버튼 */
    .ox-btns { display: flex; gap: 10px; }
    .ox-btn {
      flex: 1; padding: 20px; border-radius: 14px;
      border: 2px solid transparent; font-size: 36px;
      cursor: pointer; transition: all 0.15s; font-weight: 900;
    }
    .ox-btn.o-btn { background: #f0fdf4; border-color: #86efac; color: #16a34a; }
    .ox-btn.x-btn { background: #fff1f2; border-color: #fca5a5; color: #dc2626; }
    .ox-btn:hover:not(:disabled) { transform: scale(1.04); }
    .ox-btn:disabled { cursor: not-allowed; opacity: 0.5; }
    .ox-btn.correct { border-width: 2.5px; filter: brightness(0.92); opacity: 1 !important; }
    .ox-btn.wrong { opacity: 0.25 !important; }

    /* 해설 */
    .exp-box {
      background: #f5f3ff; border: 1px solid #c4b5fd;
      border-radius: 10px; padding: 12px 14px;
      font-size: 12px; line-height: 1.65; color: #4c1d95; display: none;
    }
    .exp-box.show { display: block; }
    .exp-label { font-weight: 700; margin-bottom: 4px; color: #6366f1; }

    /* 다음 버튼 */
    .btn-next {
      width: 100%; background: #6366f1; color: #fff; border: none;
      border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; display: none;
    }
    .btn-next.show { display: block; }
    .btn-next:hover { background: #4f46e5; }

    /* 결과 카드 */
    .result-card {
      background: #fff; border: 1px solid #e2e8f0;
      border-radius: 16px; padding: 28px 24px; text-align: center;
      display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .result-card.show { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .result-emoji { font-size: 52px; }
    .result-title { font-size: 18px; font-weight: 800; color: #1e293b; }
    .result-score { font-size: 40px; font-weight: 900; color: #6366f1; }
    .result-sub { font-size: 13px; color: #94a3b8; }
    .btn-restart {
      background: #6366f1; color: #fff; border: none;
      border-radius: 10px; padding: 12px 28px; font-size: 14px;
      font-weight: 700; cursor: pointer; margin-top: 6px; transition: background 0.2s;
    }
    .btn-restart:hover { background: #4f46e5; }

    /* 랭킹 패널 */
    .ranking-panel {
      background: #fff; border: 1px solid #e2e8f0;
      border-radius: 16px; padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .ranking-title { font-size: 13px; font-weight: 700; color: #64748b; margin-bottom: 12px; }
    .rank-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px;
    }
    .rank-item:last-child { border-bottom: none; }
    .rank-num {
      width: 24px; height: 24px; border-radius: 50%; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #94a3b8; flex-shrink: 0;
    }
    .rank-num.gold   { background: #fef9c3; color: #ca8a04; }
    .rank-num.silver { background: #f1f5f9; color: #64748b; }
    .rank-num.bronze { background: #fff7ed; color: #c2410c; }
    .rank-name { flex: 1; color: #334155; font-weight: 500; }
    .rank-score { font-weight: 700; color: #6366f1; }
    .rank-me { color: #16a34a !important; font-weight: 700; }

    @media (max-width: 700px) {
      .game-area { flex-direction: column; }
      .quiz-panel { width: 100%; }
      .control-bar { gap: 8px; }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <div class="logo">🗺️ <span>백지도</span>정복</div>
    <div class="user-badge" id="userBadge">로딩 중...</div>
  </div>
  <div class="header-right">
    <div class="score-badge">⭐ 총점 <span id="totalScore">0</span></div>
    <button class="btn-sm" id="rankBtn">🏆 랭킹</button>
    <button class="btn-sm" id="logoutBtn">로그아웃</button>
  </div>
</div>

<div class="main">

  <!-- 상단 컨트롤 바 (문제유형 + 지역선택 한 줄) -->
  <div class="control-bar">

    <!-- 문제 유형 -->
    <div class="mode-tabs">
      <div class="mode-tab active" data-mode="mcq">
        <span class="icon">📝</span> 4지선다
      </div>
      <div class="mode-tab" data-mode="ox">
        <span class="icon">⭕</span> OX 퀴즈
      </div>
    </div>

    <div class="divider"></div>

    <!-- 지역 필터 -->
    <span class="filter-label">지역</span>
    <div class="filter-btns">
      <button class="filter-btn active" data-region="전체">전체</button>
      <button class="filter-btn" data-region="수도권">수도권</button>
      <button class="filter-btn" data-region="강원">강원</button>
      <button class="filter-btn" data-region="충청">충청</button>
      <button class="filter-btn" data-region="호남">호남</button>
      <button class="filter-btn" data-region="영남">영남</button>
      <button class="filter-btn" data-region="제주">제주</button>
    </div>

  </div>

  <!-- 게임 영역 -->
  <div class="game-area">

    <!-- 백지도 패널 -->
    <div class="map-panel">
      <div class="map-top">
        <div class="map-hint">
          <span id="selectedBadge" class="selected-region-badge">🌏 전체</span>
          <span style="color:#cbd5e1; font-size:11px; margin-left:4px;">지도를 클릭해 지역 선택</span>
        </div>
        <div class="map-controls">
          <button class="toggle-btn active" id="toggleProv">시·도</button>
          <button class="toggle-btn" id="toggleMuni">시·군</button>
        </div>
      </div>
      <svg id="map-svg" viewBox="0 0 760 806" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- 퀴즈 패널 -->
    <div class="quiz-panel">

      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="qCount">0 / 10</div>
      </div>

      <div class="question-card" id="questionCard">
        <div class="q-meta">
          <span class="q-type-badge badge-mcq" id="qTypeBadge">4지선다</span>
          <span class="q-region" id="qRegion"></span>
          <span class="q-count" id="qCountBadge"></span>
        </div>
        <div class="question-text" id="questionText">지역을 선택하면 문제가 시작됩니다!</div>
      </div>

      <div class="choices" id="choicesArea"></div>

      <div class="ox-btns" id="oxArea" style="display:none">
        <button class="ox-btn o-btn" id="oBtn">O</button>
        <button class="ox-btn x-btn" id="xBtn">X</button>
      </div>

      <div class="exp-box" id="expBox">
        <div class="exp-label">📖 해설</div>
        <div id="expText"></div>
      </div>

      <button class="btn-next" id="nextBtn">다음 문제 →</button>

      <div class="result-card" id="resultCard">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <div class="result-title">세션 결과</div>
        <div class="result-score" id="resultScore"></div>
        <div class="result-sub" id="resultSub"></div>
        <button class="btn-restart" id="restartBtn">다시 하기</button>
      </div>

      <div class="ranking-panel" id="rankingPanel" style="display:none">
        <div class="ranking-title">🏆 TOP 랭킹</div>
        <div id="rankList"></div>
      </div>

    </div>
  </div>
</div>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, setDoc, collection, query, orderBy, limit, getDocs, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { MCQ, OX } from './js/questions.js';

// ── 지역명 → region 매핑 (시도명 → 문제 region 태그) ──
const REGION_MAP = {
  '서울특별시':   '수도권',
  '인천광역시':   '수도권',
  '경기도':       '수도권',
  '강원특별자치도': '강원',
  '충청북도':     '충청',
  '충청남도':     '충청',
  '대전광역시':   '충청',
  '세종특별자치시': '충청',
  '전북특별자치도': '호남',
  '전라남도':     '호남',
  '광주광역시':   '호남',
  '경상북도':     '영남',
  '경상남도':     '영남',
  '대구광역시':   '영남',
  '부산광역시':   '영남',
  '울산광역시':   '영남',
  '제주특별자치도': '제주',
};

// ── 상태 ──────────────────────────────────────
let currentUser = null;
let currentMode = 'mcq';
let currentRegion = '전체';   // '전체' 또는 '수도권' 등
let mapLevel = 'prov';
let questionPool = [];
let currentQ = null;
let qIndex = 0;
let sessionScore = 0;
let answered = false;
const QUESTIONS_PER_SESSION = 10;

// ── 인증 ──────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
  document.getElementById('userBadge').textContent = user.email.split('@')[0];

  const userRef = doc(db, 'users', user.uid);
  const snap = await getDoc(userRef);
  if (snap.exists()) {
    document.getElementById('totalScore').textContent = snap.data().totalScore || 0;
  } else {
    await setDoc(userRef, { email: user.email, totalScore: 0, playCount: 0, createdAt: new Date() });
  }
  renderMap();
  startSession();
});

// ── 로그아웃 ──────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await signOut(auth);
  window.location.href = 'index.html';
});

// ── 문제 유형 탭 ──────────────────────────────
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    startSession();
  });
});

// ── 지역 필터 버튼 ────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    setRegion(btn.dataset.region);
  });
});

// 지역 설정 공통 함수
function setRegion(region) {
  currentRegion = region;

  // 버튼 활성화 동기화
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.region === region);
  });

  // 지도 지역 강조 동기화
  highlightMapRegion(region);

  // 선택 배지 업데이트
  const emoji = region === '전체' ? '🌏' :
    region === '수도권' ? '🏙️' : region === '강원' ? '🏔️' :
    region === '충청' ? '🌾' : region === '호남' ? '🌊' :
    region === '영남' ? '⚓' : '🍊';
  document.getElementById('selectedBadge').textContent = `${emoji} ${region}`;

  startSession();
}

// ── 시도/시군 토글 ─────────────────────────────
document.getElementById('toggleProv').addEventListener('click', () => {
  mapLevel = 'prov';
  document.getElementById('toggleProv').classList.add('active');
  document.getElementById('toggleMuni').classList.remove('active');
  renderMap();
});
document.getElementById('toggleMuni').addEventListener('click', () => {
  mapLevel = 'muni';
  document.getElementById('toggleMuni').classList.add('active');
  document.getElementById('toggleProv').classList.remove('active');
  renderMap();
});

// ── 랭킹 ──────────────────────────────────────
document.getElementById('rankBtn').addEventListener('click', () => {
  const panel = document.getElementById('rankingPanel');
  if (panel.style.display === 'none') { loadRanking(); panel.style.display = 'block'; }
  else panel.style.display = 'none';
});

// ── 지도 렌더링 ───────────────────────────────
function renderMap() {
  const svg = document.getElementById('map-svg');
  svg.innerHTML = '';
  const data = mapLevel === 'prov' ? window.PROVINCES : window.MUNIS;
  if (!data) return;

  Object.entries(data).forEach(([name, info]) => {
    const paths = info.d.split(/(?=M)/).filter(Boolean);
    paths.forEach(pathD => {
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      el.setAttribute('d', pathD);
      el.setAttribute('data-name', name);
      el.setAttribute('data-region', info.region || '');
      el.addEventListener('click', () => onMapRegionClick(name, info));
      svg.appendChild(el);
    });

    // 시도 레벨에서 지명 표시
    if (mapLevel === 'prov' && info.cx) {
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', info.cx);
      text.setAttribute('y', info.cy);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('font-size', '8');
      text.setAttribute('fill', '#64748b');
      text.setAttribute('pointer-events', 'none');
      const short = name
        .replace(/특별자치도|특별자치시|광역시|특별시/, '')
        .replace(/도$/, '');
      text.textContent = short;
      svg.appendChild(text);
    }
  });

  // 현재 선택 지역 강조 유지
  highlightMapRegion(currentRegion);
}

// ── 지도에서 시도 클릭 → 지역 선택 ──────────────
function onMapRegionClick(name, info) {
  // 시도 단위에서만 지역 선택 동작
  if (mapLevel !== 'prov') return;

  // 클릭한 시도 → region 태그로 변환
  const region = REGION_MAP[name] || info.region || null;
  if (!region) return;

  setRegion(region);
}

// ── 지도 지역 강조 ────────────────────────────
function highlightMapRegion(region) {
  if (!window.PROVINCES) return;
  document.querySelectorAll('#map-svg path').forEach(el => {
    const elRegion = el.getAttribute('data-region');
    // PROVINCES의 region 값과 비교 (영남, 호남, 수도권 등)
    const regionTagMap = {
      '수도권': '수도권', '강원': '강원', '충청': '충청',
      '호남': '호남', '영남': '영남', '제주': '제주'
    };
    if (region === '전체') {
      el.classList.remove('selected-region');
    } else {
      const tag = regionTagMap[region];
      if (tag && elRegion === tag) {
        el.classList.add('selected-region');
      } else {
        el.classList.remove('selected-region');
      }
    }
  });
}

// ── 세션 시작 ─────────────────────────────────
function startSession() {
  sessionScore = 0; qIndex = 0; answered = false;
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('questionCard').style.display = 'block';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('expBox').classList.remove('show');
  document.getElementById('rankingPanel').style.display = 'none';

  // 문제 풀 구성
  let pool = currentMode === 'mcq' ? MCQ : OX;

  // 지역 필터
  if (currentRegion !== '전체') {
    pool = pool.filter(q => q.region === currentRegion);
  }

  if (pool.length === 0) {
    document.getElementById('questionText').textContent = '해당 지역의 문제가 없습니다. 다른 지역을 선택하세요.';
    document.getElementById('choicesArea').innerHTML = '';
    document.getElementById('oxArea').style.display = 'none';
    return;
  }

  questionPool = shuffle([...pool]).slice(0, QUESTIONS_PER_SESSION);

  // 배지 업데이트
  if (currentMode === 'mcq') {
    document.getElementById('qTypeBadge').textContent = '4지선다';
    document.getElementById('qTypeBadge').className = 'q-type-badge badge-mcq';
  } else {
    document.getElementById('qTypeBadge').textContent = 'OX 퀴즈';
    document.getElementById('qTypeBadge').className = 'q-type-badge badge-ox';
  }

  loadQuestion();
}

// ── 문제 로드 ─────────────────────────────────
function loadQuestion() {
  if (qIndex >= questionPool.length) { showResult(); return; }

  answered = false;
  currentQ = questionPool[qIndex];

  document.getElementById('progressFill').style.width = `${(qIndex / questionPool.length) * 100}%`;
  document.getElementById('qCount').textContent = `${qIndex + 1} / ${questionPool.length}`;
  document.getElementById('qCountBadge').textContent = `${qIndex + 1} / ${questionPool.length}`;
  document.getElementById('qRegion').textContent = currentQ.region || '';
  document.getElementById('questionText').textContent = currentQ.q;
  document.getElementById('expBox').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');

  if (currentMode === 'mcq') {
    document.getElementById('oxArea').style.display = 'none';
    renderChoices(currentQ.choices, currentQ.answer);
  } else {
    document.getElementById('choicesArea').innerHTML = '';
    document.getElementById('oxArea').style.display = 'flex';
    resetOxBtns();
  }
}

// ── MCQ 보기 ──────────────────────────────────
function renderChoices(choices, answerIdx) {
  const area = document.getElementById('choicesArea');
  area.innerHTML = '';
  choices.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="num">${i + 1}</span>${text}`;
    btn.addEventListener('click', () => {
      if (answered) return;
      answered = true;
      const correct = i === answerIdx;
      if (correct) { btn.classList.add('correct'); sessionScore++; }
      else {
        btn.classList.add('wrong');
        area.querySelectorAll('.choice-btn')[answerIdx].classList.add('correct');
      }
      area.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      showExp();
    });
    area.appendChild(btn);
  });
}

// ── OX ────────────────────────────────────────
function resetOxBtns() {
  const o = document.getElementById('oBtn');
  const x = document.getElementById('xBtn');
  o.disabled = false; x.disabled = false;
  o.className = 'ox-btn o-btn';
  x.className = 'ox-btn x-btn';
}

document.getElementById('oBtn').addEventListener('click', () => handleOX(true));
document.getElementById('xBtn').addEventListener('click', () => handleOX(false));

function handleOX(answer) {
  if (answered) return;
  answered = true;
  const correct = answer === currentQ.answer;
  if (correct) sessionScore++;
  const o = document.getElementById('oBtn');
  const x = document.getElementById('xBtn');
  if (correct) {
    (answer ? o : x).classList.add('correct');
    (!answer ? o : x).classList.add('wrong');
  } else {
    (answer ? o : x).classList.add('wrong');
    (currentQ.answer ? o : x).classList.add('correct');
  }
  o.disabled = true; x.disabled = true;
  showExp();
}

// ── 해설 ──────────────────────────────────────
function showExp() {
  if (currentQ.exp) {
    document.getElementById('expText').textContent = currentQ.exp;
    document.getElementById('expBox').classList.add('show');
  }
  document.getElementById('nextBtn').classList.add('show');
}

// ── 다음 버튼 ─────────────────────────────────
document.getElementById('nextBtn').addEventListener('click', () => { qIndex++; loadQuestion(); });

// ── 결과 ──────────────────────────────────────
async function showResult() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('choicesArea').innerHTML = '';
  document.getElementById('oxArea').style.display = 'none';
  document.getElementById('expBox').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');

  const total = questionPool.length;
  const pct = Math.round((sessionScore / total) * 100);
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '😊' : '😢';

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultScore').textContent = `${sessionScore} / ${total}`;
  document.getElementById('resultSub').textContent = `정답률 ${pct}%`;
  document.getElementById('resultCard').classList.add('show');

  if (currentUser) {
    const userRef = doc(db, 'users', currentUser.uid);
    await updateDoc(userRef, { totalScore: increment(sessionScore), playCount: increment(1), lastPlayed: new Date() });
    const snap = await getDoc(userRef);
    document.getElementById('totalScore').textContent = snap.data().totalScore || 0;
  }
}

document.getElementById('restartBtn').addEventListener('click', startSession);

// ── 랭킹 ──────────────────────────────────────
async function loadRanking() {
  const q = query(collection(db, 'users'), orderBy('totalScore', 'desc'), limit(10));
  const snap = await getDocs(q);
  const list = document.getElementById('rankList');
  list.innerHTML = '';
  let i = 0;
  snap.forEach(docSnap => {
    const data = docSnap.data();
    const isMe = currentUser && docSnap.id === currentUser.uid;
    const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    list.innerHTML += `
      <div class="rank-item">
        <div class="rank-num ${cls}">${i + 1}</div>
        <div class="rank-name ${isMe ? 'rank-me' : ''}">${(data.email||'').split('@')[0]}${isMe?' ★':''}</div>
        <div class="rank-score ${isMe ? 'rank-me' : ''}">${data.totalScore||0}점</div>
      </div>`;
    i++;
  });
}

// ── 셔플 ──────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
