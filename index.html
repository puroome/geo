<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>한국지리 백지도 정복</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="logo-area">
      <span class="logo-icon">🗺️</span>
      <div class="logo-title">한국지리 <span>백지도 정복</span></div>
      <div class="logo-sub">수능 한국지리 · 지역 학습 게임</div>
    </div>
    <div class="card">
      <div class="card-title">학생 로그인</div>
      <div class="field">
        <label>아이디 (이메일 형식)</label>
        <input type="email" id="email" placeholder="예) 10101@james.com" autocomplete="username">
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <button class="btn-login" id="loginBtn">로그인</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
    <div class="hint">선생님께 아이디와 비밀번호를 받아 입력하세요</div>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'game.html';
    });

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
    function clearError() { errorMsg.style.display = 'none'; }

    async function doLogin() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) { showError('아이디와 비밀번호를 입력하세요.'); return; }
      loginBtn.disabled = true; loginBtn.textContent = '로그인 중...'; clearError();
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        let msg = '로그인 실패. 아이디 또는 비밀번호를 확인하세요.';
        if (e.code === 'auth/too-many-requests') msg = '시도 횟수 초과. 잠시 후 다시 해주세요.';
        showError(msg);
        loginBtn.disabled = false; loginBtn.textContent = '로그인';
      }
    }

    loginBtn.addEventListener('click', doLogin);
    passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') passwordInput.focus(); });
  </script>
</body>
</html>
