<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>한국지리 GAME</title>
  <script type="text/javascript" nonce="5cc3d97cd0464a6ca62effa6443" src="//local.adguard.org?ts=1782558473152&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_00000000f648720683b44bc91cb93cea%26fn%3D03_%25ED%2595%259C%25EA%25B5%25AD%25EC%25A7%2580%25EB%25A6%25AC%25ED%2595%2599%25EC%258A%25B5%25EC%2595%25B1_index.html%26cd%3Dattachment%26ts%3D495155%26p%3Dfs%26cid%3D1%26sig%3D1754d086938d57b60a6744e61302f06913adc74611d1103e2c95146808748768%26v%3D0&amp;app=whale.exe&amp;css=2&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1"></script><script type="text/javascript" nonce="5cc3d97cd0464a6ca62effa6443" src="//local.adguard.org?ts=1782558473152&amp;name=AdGuard%20Assistant&amp;name=AdGuard%20Extra&amp;name=AdGuard%20Popup%20Blocker&amp;type=user-script"></script><link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f766e">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="logo-area">
      <span class="logo-icon">🗺️</span>
      <div class="logo-title">지리 <span> GAME</span></div>
      <div class="logo-sub">한국지도 정복</div>
    </div>
    <div class="card">
      <div class="card-title">로그인</div>
      <div class="field">
        <label>아이디 (이메일 형식)</label>
        <input type="email" id="email" placeholder="" autocomplete="username">
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="password" placeholder="" autocomplete="current-password">
      </div>
      <button class="btn-login" id="loginBtn">로그인</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
    <div class="hint">James쌤한테 ID/PW를 받아 입력하세요</div>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'game.html';
    });

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
    function clearError() { errorMsg.style.display = 'none'; }

    async function doLogin() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) { showError('아이디와 비밀번호를 입력하세요.'); return; }
      loginBtn.disabled = true; loginBtn.textContent = '로그인 중...'; clearError();
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        let msg = '로그인 실패. 아이디 또는 비밀번호를 확인하세요.';
        if (e.code === 'auth/too-many-requests') msg = '시도 횟수 초과. 잠시 후 다시 해주세요.';
        showError(msg);
        loginBtn.disabled = false; loginBtn.textContent = '로그인';
      }
    }

    loginBtn.addEventListener('click', doLogin);
    passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') passwordInput.focus(); });
  </script>

  <!-- PWA: 서비스 워커 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('./service-worker.js')
        .catch((error) => {
          console.error('서비스 워커 등록 실패:', error);
        });
    }
  </script>

</body>
</html>
